<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dijeljenje Troskova</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="app-shell">
      <header class="topbar card">
        <div>
          <p class="eyebrow">Split app</p>
          <h1>Dijeljenje troskova</h1>
        </div>
        <button id="copy-share-link-btn" class="btn btn-secondary">Kopiraj share link</button>
      </header>

      <section class="card grid-2">
        <div>
          <label for="group-name-input">Naziv grupe</label>
          <input id="group-name-input" type="text" placeholder="Npr. Vikend putovanje" maxlength="50" />
        </div>
        <div>
          <label for="my-name-input">Tvoje ime</label>
          <input id="my-name-input" type="text" placeholder="Npr. Luka" maxlength="30" />
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Clanovi</h2>
          <div class="inline-form">
            <input id="new-member-input" type="text" placeholder="Dodaj clana" maxlength="30" />
            <button id="add-member-btn" class="btn">Dodaj</button>
          </div>
        </div>
        <ul id="member-list" class="chip-list"></ul>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Novi trosak</h2>
        </div>
        <form id="expense-form" class="expense-form">
          <div>
            <label for="expense-description">Opis</label>
            <input id="expense-description" type="text" required maxlength="100" placeholder="Npr. Vecera" />
          </div>
          <div>
            <label for="expense-amount">Iznos (EUR)</label>
            <input id="expense-amount" type="number" step="0.01" min="0.01" required placeholder="0.00" />
          </div>
          <div>
            <label for="expense-payer">Platio</label>
            <select id="expense-payer" required></select>
          </div>
          <fieldset>
            <legend>Podijeli na</legend>
            <div id="participant-checkboxes" class="checkbox-grid"></div>
          </fieldset>
          <button id="save-expense-btn" type="submit" class="btn">Spremi trosak</button>
          <button id="cancel-edit-btn" type="button" class="btn btn-ghost hidden">Odustani od izmjene</button>
        </form>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Troskovi</h2>
        </div>
        <ul id="expense-list" class="expense-list"></ul>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Salda i poravnanja</h2>
        </div>
        <ul id="balances-list" class="balance-list"></ul>
        <ul id="settlements-list" class="settlement-list"></ul>
      </section>

      <p id="status" class="status"></p>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
